<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bootstrap Infinite Carousel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .carousel-track {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }
    .carousel-item-custom {
      flex: 0 0 calc(100% / 3);
    }
  </style>
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

  <div class="container">
    <div class="overflow-hidden border rounded shadow-sm">
      <div class="carousel-track" id="carouselTrack">
        <div class="carousel-item-custom p-3">
          <div class="bg-white rounded text-center p-5 shadow-sm">Item 1</div>
        </div>
        <div class="carousel-item-custom p-3">
          <div class="bg-white rounded text-center p-5 shadow-sm">Item 2</div>
        </div>
        <div class="carousel-item-custom p-3">
          <div class="bg-white rounded text-center p-5 shadow-sm">Item 3</div>
        </div>
        <div class="carousel-item-custom p-3">
          <div class="bg-white rounded text-center p-5 shadow-sm">Item 4</div>
        </div>
        <div class="carousel-item-custom p-3">
          <div class="bg-white rounded text-center p-5 shadow-sm">Item 5</div>
        </div>
        <div class="carousel-item-custom p-3">
          <div class="bg-white rounded text-center p-5 shadow-sm">Item 6</div>
        </div>
        <!-- Clones for seamless loop -->
        <div class="carousel-item-custom p-3">
          <div class="bg-white rounded text-center p-5 shadow-sm">Item 1</div>
        </div>
        <div class="carousel-item-custom p-3">
          <div class="bg-white rounded text-center p-5 shadow-sm">Item 2</div>
        </div>
        <div class="carousel-item-custom p-3">
          <div class="bg-white rounded text-center p-5 shadow-sm">Item 3</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const track = document.getElementById('carouselTrack');
    const items = document.querySelectorAll('.carousel-item-custom');
    const visibleItems = 3;
    const totalItems = items.length;
    const itemWidth = 100 / visibleItems;
    let index = 0;

    function moveCarousel() {
      index++;
      track.style.transition = 'transform 0.5s ease-in-out';
      track.style.transform = `translateX(-${index * itemWidth}%)`;

      if (index >= totalItems - visibleItems) {
        setTimeout(() => {
          track.style.transition = 'none';
          index = 0;
          track.style.transform = `translateX(0%)`;
        }, 500);
      }
    }

    setInterval(moveCarousel, 3000);
  </script>

</body>
</html>
